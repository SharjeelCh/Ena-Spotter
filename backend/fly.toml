app = "ena-spotter-backend"

[build]
  image = "dockerfile"

[env]
  DEBUG = "False"
  SECRET_KEY = "replace-with-secret"
  ALLOWED_HOSTS = "localhost,127.0.0.1"
  CORS_ALLOWED_ORIGINS = "http://localhost:5173,https://yourdomain.vercel.app"

[[services]]
  internal_port = 8000
  protocol = "tcp"
  [services.concurrency]
    hard_limit = 25
    soft_limit = 20
  [[services.ports]]
    port = 80
